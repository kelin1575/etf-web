name: Daily ETF Data Update

on:
  schedule:
    - cron: '0 15 * * 1-5'   # 한국시간 자정 (UTC 15:00) 평일만
  workflow_dispatch:           # 수동 실행 버튼

permissions:
  contents: write              # public/data/ 커밋 push 권한

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install pykrx pandas numpy

      - name: Fetch ETF data
        run: python scripts/fetch_etf_data.py

      - name: Generate Top3 + history
        run: python scripts/generate_top3.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/etf_summary.json public/data/prices.json \
                  public/data/top3.json public/data/history.json
          git diff --staged --quiet || \
            git commit -m "data: $(date +'%Y-%m-%d') ETF 데이터 갱신"
          git push
